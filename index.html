function renderAnalyticsByTeam(){
  const data = AN_DATA || [];
  const TEAM_COLORS=['#6366F1','#10B981','#F59E0B','#EF4444','#8B5CF6','#3B82F6','#EC4899','#14B8A6'];
  
  // By assigned agent
  const byAgent={};
  data.filter(a=>a.assigned_to_name).forEach(a=>{
    const n=a.assigned_to_name;
    if(!byAgent[n])byAgent[n]={total:0,completed:0,open:0,rejected:0,avgDays:0,days:[]};
    byAgent[n].total++;
    if(a.status==='completed')byAgent[n].completed++;
    else if(['open','assigned','accepted'].includes(a.status))byAgent[n].open++;
    if(a.status==='rejected')byAgent[n].rejected++;
    const start=new Date(a.created_at||Date.now()).getTime();
    const end=a.completed_at?new Date(a.completed_at).getTime():Date.now();
    byAgent[n].days.push((end-start)/(1000*3600*24));
  });
  Object.values(byAgent).forEach(t=>{t.avgDays=t.days.length?(t.days.reduce((a,b)=>a+b,0)/t.days.length).toFixed(1):'—';delete t.days;});
  
  // By CMPAK POC
  const byPoc={};
  data.filter(a=>a.poc_name).forEach(a=>{
    const n=a.poc_name;
    if(!byPoc[n])byPoc[n]={total:0,completed:0};
    byPoc[n].total++;
    if(a.status==='completed')byPoc[n].completed++;
  });
  
  const agentEntries = Object.entries(byAgent).sort((a,b)=>b[1].total-a[1].total);
  const pocEntries = Object.entries(byPoc).sort((a,b)=>b[1].total-a[1].total);
  const maxAgent = agentEntries[0]?.[1]?.total||1;
  
  return `<div>
    <div style="font-size:18px;font-weight:800;color:#111827;margin-bottom:18px">👥 Team Performance</div>
    <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:16px">
      <!-- Agent Table -->
      <div style="background:#fff;border-radius:14px;padding:20px;border:1px solid #E5E7EB;box-shadow:0 1px 4px rgba(0,0,0,.06)">
        <div style="font-size:13px;font-weight:700;color:#111827;margin-bottom:14px">LCC Field Agents</div>
        ${!agentEntries.length?`<div style="color:#9CA3AF;font-size:13px">No assigned activities found.</div>`:`
        <div style="overflow-x:auto"><table class="data-table" style="font-size:12px">
          <thead><tr><th>Agent</th><th>Total</th><th>Done</th><th>Active</th><th>Avg Days</th><th>Rate</th></tr></thead>
          <tbody>${agentEntries.map(([name,d],i)=>{
            const col=TEAM_COLORS[i%TEAM_COLORS.length];
            const pct=d.total>0?((d.completed/d.total)*100).toFixed(0):0;
            return `<tr>
              <td style="font-weight:600"><div style="display:flex;align-items:center;gap:6px"><div style="width:22px;height:22px;border-radius:50%;background:${col};color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0">${name.slice(0,1).toUpperCase()}</div>${escH(name)}</div></td>
              <td style="font-weight:700">${d.total}</td>
              <td style="color:#059669;font-weight:600">${d.completed}</td>
              <td style="color:#2563EB;font-weight:600">${d.open}</td>
              <td style="color:#6B7280">${d.avgDays}</td>
              <td><div style="height:5px;background:#F3F4F6;border-radius:3px;width:60px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${col}"></div></div><span style="font-size:10px;color:#6B7280">${pct}%</span></td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>`}
      </div>
      <!-- POC Bars -->
      <div style="background:#fff;border-radius:14px;padding:20px;border:1px solid #E5E7EB;box-shadow:0 1px 4px rgba(0,0,0,.06)">
        <div style="font-size:13px;font-weight:700;color:#111827;margin-bottom:14px">Open vs Closed by POC</div>
        ${pocEntries.slice(0,10).map(([name,d],i)=>{
          const done=d.completed, open=d.total-d.completed;
          return `<div style="margin-bottom:10px">
            <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:3px">${escH(name)}</div>
            <div style="display:flex;height:10px;border-radius:5px;overflow:hidden">
              <div style="width:${d.total>0?(done/d.total*100):0}%;background:#10B981" title="Completed: ${done}"></div>
              <div style="width:${d.total>0?(open/d.total*100):0}%;background:#E5E7EB" title="Open: ${open}"></div>
            </div>
            <div style="display:flex;gap:10px;font-size:10px;color:#6B7280;margin-top:2px">
              <span>✓ ${done} done</span><span>○ ${open} open</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

function renderAnalyticsTimeline(){
  const data = AN_DATA || [];
  if(!data.length) return `<div class="empty-state"><div class="ei">📅</div><p>No activity data available.</p></div>`;
  
  // Group by month
  const byMonth={};
  data.forEach(a=>{
    if(!a.created_at) return;
    const m = a.created_at.slice(0,7); // YYYY-MM
    if(!byMonth[m])byMonth[m]={created:0,completed:0,open:0};
    byMonth[m].created++;
    if(a.status==='completed') byMonth[m].completed++;
    else if(['open','assigned','accepted'].includes(a.status)) byMonth[m].open++;
  });
  const months = Object.keys(byMonth).sort();
  const maxVal = Math.max(...months.map(m=>byMonth[m].created), 1);
  
  // Activity trend SVG bar chart
  const W = 600, H = 180, BAR_W = Math.max(12, Math.floor(W/months.length)-4);
  const bars = months.map((m,i)=>{
    const d=byMonth[m];
    const x = (i/(months.length||1))*W;
    const hC = (d.completed/maxVal)*H;
    const hO = (d.open/maxVal)*H;
    const hN = ((d.created-d.completed-d.open)/maxVal)*H;
    return `<g>
      <rect x="${x}" y="${H-hC}" width="${BAR_W*0.45}" height="${hC}" fill="#10B981" rx="2"/>
      <rect x="${x+BAR_W*0.5}" y="${H-hO}" width="${BAR_W*0.45}" height="${hO}" fill="#6366F1" rx="2"/>
      <text x="${x+BAR_W*0.4}" y="${H+14}" text-anchor="middle" font-size="7" fill="#9CA3AF">${m.slice(5)}</text>
    </g>`;
  }).join('');
  
  // Average aging by month
  const agingByMonth={};
  data.forEach(a=>{
    if(!a.completed_at) return;
    const m=a.completed_at.slice(0,7);
    if(!agingByMonth[m])agingByMonth[m]=[];
    const start=new Date(a.created_at).getTime();
    const end=new Date(a.completed_at).getTime();
    agingByMonth[m].push((end-start)/(1000*3600*24));
  });
  const agingMonths = Object.keys(agingByMonth).sort().slice(-12);
  const agingData = agingMonths.map(m=>({m, avg: agingByMonth[m].reduce((a,b)=>a+b,0)/agingByMonth[m].length}));
  const maxAging = Math.max(...agingData.map(d=>d.avg), 1);
  
  return `<div>
    <div style="font-size:18px;font-weight:800;color:#111827;margin-bottom:18px">📅 Activity Timeline</div>
    
    <!-- Monthly Trend Chart -->
    <div style="background:#fff;border-radius:14px;padding:20px;border:1px solid #E5E7EB;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-size:13px;font-weight:700;color:#111827">Monthly Activity Volume (${months.length} months)</div>
        <div style="display:flex;gap:12px;font-size:11px">
          <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#10B981;display:inline-block"></span> Completed</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#6366F1;display:inline-block"></span> Active</span>
        </div>
      </div>
      <div style="overflow-x:auto">
        <svg width="${Math.max(W,months.length*20)}" height="${H+30}" style="display:block">
          <g>
            ${[0,0.25,0.5,0.75,1].map(frac=>{const y=H-frac*H;return`<line x1="0" y1="${y}" x2="${Math.max(W,months.length*20)}" y2="${y}" stroke="#F3F4F6" stroke-width="1"/><text x="-2" y="${y+4}" text-anchor="end" font-size="8" fill="#9CA3AF">${Math.round(frac*maxVal)}</text>`;}).join('')}
          </g>
          ${bars}
        </svg>
      </div>
    </div>
    
    <!-- Avg Aging Trend -->
    ${agingData.length?`<div style="background:#fff;border-radius:14px;padding:20px;border:1px solid #E5E7EB;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px">
      <div style="font-size:13px;font-weight:700;color:#111827;margin-bottom:14px">Average Resolution Time (days) — Last ${agingData.length} Months</div>
      <div style="display:flex;align-items:flex-end;gap:6px;height:80px;padding-top:10px">
        ${agingData.map(({m,avg})=>{
          const h=Math.round((avg/maxAging)*70);
          const col = avg<2?'#10B981':avg<5?'#6366F1':avg<10?'#F59E0B':'#EF4444';
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
            <div style="font-size:9px;font-weight:700;color:${col}">${avg.toFixed(1)}</div>
            <div style="width:100%;background:${col};border-radius:3px 3px 0 0;height:${h}px"></div>
            <div style="font-size:8px;color:#9CA3AF;transform:rotate(-45deg);transform-origin:top right;white-space:nowrap">${m.slice(5)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`:''}
    
    <!-- Month-by-Month Table -->
    <div style="background:#fff;border-radius:14px;padding:20px;border:1px solid #E5E7EB;box-shadow:0 1px 4px rgba(0,0,0,.06)">
      <div style="font-size:13px;font-weight:700;color:#111827;margin-bottom:14px">Monthly Breakdown</div>
      <div style="overflow-x:auto"><table class="data-table" style="font-size:12px">
        <thead><tr><th>Month</th><th>Created</th><th>Completed</th><th>Active</th><th>Completion %</th></tr></thead>
        <tbody>${months.slice().reverse().slice(0,24).map(m=>{
          const d=byMonth[m];
          const pct=d.created>0?((d.completed/d.created)*100).toFixed(1):0;
          const col=pct>=80?'#059669':pct>=50?'#D97706':'#DC2626';
          return `<tr>
            <td style="font-weight:700">${m}</td>
            <td>${d.created}</td>
            <td style="color:#059669;font-weight:600">${d.completed}</td>
            <td style="color:#2563EB;font-weight:600">${d.open}</td>
            <td><span style="color:${col};font-weight:700">${pct}%</span></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>
  </div>`;
}
</script>
</body>
